# EpixNet public gateway — gateway.epixnet.io
#
# Drop this file at /etc/nginx/sites-available/gateway.epixnet.io,
# symlink into sites-enabled, then run certbot to attach TLS:
#
#   sudo ln -s /etc/nginx/sites-available/gateway.epixnet.io \
#              /etc/nginx/sites-enabled/gateway.epixnet.io
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d gateway.epixnet.io
#
# certbot will rewrite the :80 server block to redirect to :443 and
# inject the ssl_certificate lines into the :443 block. Re-running
# `sudo certbot renew` from cron keeps the cert fresh.

# Map Upgrade header so the websocket proxy works.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Plain-HTTP listener. certbot will edit / duplicate this block for :443.
server {
    server_name gateway.epixnet.io;

    # Generous body size: EpixNet wraps may stream sizable assets.
    client_max_body_size 50m;

    # Long timeouts so the gateway websocket connection stays open.
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 60s;

    # Lightweight public stats JSON endpoint for epixnet.io's marketing
    # header (cached server-side for 30s by the NoNewSites plugin, doesn't
    # touch live sockets so it's safe to expose).
    location = /Stats.json {
        # Short-circuit preflight checks.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Max-Age       3600 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=30" always;

        proxy_pass         http://127.0.0.1:42222;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_buffering off;
    }

    # Block the full /Stats debug page from the public — it iterates live
    # sockets, can crash with OSError when peers disconnect mid-stream, and
    # exposes internal debug data. Use /Stats.json above instead.
    location = /Stats {
        return 404;
    }

    # Hand off to EpixNet running on localhost:42222.
    location / {
        proxy_pass         http://127.0.0.1:42222;
        proxy_http_version 1.1;

        # Preserve original host so EpixNet's ui_host allowlist matches
        # and ui_trans_proxy routes requests by hostname correctly.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade for the /Websocket endpoint.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Don't buffer responses — EpixNet streams site content.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/gateway.epixnet.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/gateway.epixnet.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = gateway.epixnet.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name gateway.epixnet.io;
    return 404; # managed by Certbot


}