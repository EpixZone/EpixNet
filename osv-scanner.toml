# Desktop system-tray stack (Linux, epix-browser only): tao/tray-icon need the
# gtk-rs GTK3 bindings, which upstream deprecated (GTK3 is EOL). Unavoidable for
# a cross-platform tray; the Rust desktop ecosystem (Tauri included) ignores the
# same set. All "unmaintained" except glib (see its note).
