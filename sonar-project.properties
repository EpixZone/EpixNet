# SonarCloud configuration for EpixNet.
# Set up: import the repo at https://sonarcloud.io, then add SONAR_TOKEN as a
# GitHub Actions secret. Replace the org/key below with your SonarCloud values.
sonar.organization=epixzone
sonar.projectKey=EpixZone_EpixNet

sonar.sources=crates
sonar.exclusions=target/**,**/tests/**,**/examples/**
sonar.tests=crates
sonar.test.inclusions=**/tests/**

# Rust analysis in SonarCloud/SonarQube uses clippy output. Point it here if you
# export clippy to SARIF in CI.
# sonar.rust.clippy.reportPaths=clippy.sarif
