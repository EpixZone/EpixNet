name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          # Rust support is in public preview. If the build step fails on your
          # runner, switch to build-mode: none.
          languages: rust
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:rust"
