name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions: {}

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # The extractor runs the workspace build scripts; skip the wallet
      # extension download (network access, irrelevant to analysis).
      EPIX_WALLET_SKIP: "1"
      # Point the extractor's internal cargo runs at ./target so rust-cache
      # can persist them between runs.
      CODEQL_EXTRACTOR_RUST_OPTION_CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The Rust extractor resolves code with rust-analyzer, so it needs the
      # same environment as a real build: a toolchain with the rust-src
      # component (standard library sources), the dependency sources, and the
      # system libraries the build scripts probe for. Without these, calls
      # into std and third-party crates stay unresolved and code scanning
      # reports "Low Rust analysis quality".
      - name: Install Linux build deps (protoc + libudev for the Ledger HID bridge; GTK/AppIndicator for the system tray)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libudev-dev pkg-config libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      # Pinned to 1.94, not stable: the extractor's bundled rust-analyzer
      # (ra_ap 0.0.301 in CodeQL 2.26.0) passes --lockfile-path to
      # `cargo metadata`, and cargo 1.95+ removed that flag. cargo then exits
      # with an error, rust-analyzer silently falls back to a workspace with
      # no dependency or std resolution, and the scan reports "Low Rust
      # analysis quality". 1.94 is the last toolchain that accepts the flag.
      # Unpin to stable once the CodeQL bundle ships a rust-analyzer with the
      # upper version bound fix (rust-lang/rust-analyzer#21783).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # 1.94
        with:
          toolchain: "1.94"
          components: rust-src
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Fetch dependencies
        run: cargo fetch --locked
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: rust
          build-mode: none
      - uses: github/codeql-action/analyze@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          category: "/language:rust"
