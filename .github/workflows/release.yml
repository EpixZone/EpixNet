name: Release

# Build official, signed release artifacts when a version tag is pushed
# (e.g. `git tag v0.2.0 && git push origin v0.2.0`), and attach them to a
# GitHub Release. Also runnable by hand (workflow_dispatch) for a dry run.


on:
  push:
    # Release tags must start with `v` (e.g. `v0.3.1`); the version step strips
    # the leading `v`. A tag without it does not trigger a release. To reject
    # such tags at creation time, add a repository tag ruleset (see below).
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc (mesh transport build dep)
        run: brew install protobuf

      - name: Fetch Firefox ESR to bundle
        run: packaging/fetch-firefox-esr.sh osx

      - name: Import Developer ID certificate
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12" ]; then
            echo "No signing cert secret set - the build will be ad-hoc signed (unnotarized)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/epix.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Make our keychain the default search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, DMG
        env:
          EPIX_VERSION: ${{ steps.v.outputs.version }}
          EPIX_MAKE_DMG: "1"
          EPIX_BUNDLE_FIREFOX: ${{ github.workspace }}/packaging/firefox-esr/Firefox.app
          # Empty when secrets are unset -> build-app.sh falls back to ad-hoc.
          EPIX_SIGN_ID: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: packaging/macos/build-app.sh

      - uses: actions/upload-artifact@v7
        with:
          name: epix-macos
          path: dist/Epix-*.dmg

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux build deps (protoc + libudev for the Ledger HID bridge)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libudev-dev pkg-config
      - name: Fetch Firefox ESR to bundle
        run: packaging/fetch-firefox-esr.sh linux
      - name: Build Linux tarball
        env:
          EPIX_VERSION: ${{ steps.v.outputs.version }}
          EPIX_BUNDLE_FIREFOX: ${{ github.workspace }}/packaging/firefox-esr/firefox
        run: packaging/linux/build-linux.sh
      - uses: actions/upload-artifact@v7
        with:
          name: epix-linux
          path: dist/epix-linux-*.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set version from tag
        id: v
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Install protoc (mesh transport build dep)
        run: choco install protoc -y --no-progress
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Fetch Firefox ESR to bundle
        shell: bash
        run: packaging/fetch-firefox-esr.sh win64
      - name: Build installer
        shell: bash
        env:
          EPIX_VERSION: ${{ steps.v.outputs.version }}
          EPIX_BUNDLE_FIREFOX: ${{ github.workspace }}/packaging/firefox-esr/firefox
        run: |
          # makensis comes from the NSIS install; put it on PATH for Git Bash.
          export PATH="/c/Program Files (x86)/NSIS:$PATH"
          packaging/windows/build-windows.sh
      # Sign the installer + the two exes with Azure Trusted Signing, if the
      # Azure secrets are configured (otherwise ship it unsigned).
      - name: Check signing config
        id: signcfg
        shell: bash
        run: |
          if [ -n "${{ secrets.AZURE_TENANT_ID }}" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false; installer will be unsigned"
            echo "sign=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Sign with Azure Trusted Signing
        if: steps.signcfg.outputs.sign == 'true'
        # Pin bumped as Microsoft releases the action; check the latest tag at
        # github.com/Azure/trusted-signing-action before a release.
        uses: azure/trusted-signing-action@v2.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TS_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_TS_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TS_PROFILE }}
          files-folder: ${{ github.workspace }}/dist
          files-folder-filter: exe
          files-folder-recurse: true
      - uses: actions/upload-artifact@v7
        with:
          name: epix-windows
          path: dist/Epix-Setup-*.exe

  # Signed Android APK for direct download (sideloading). Without
  # ANDROID_KEYSTORE_BASE64 the job still builds an UNSIGNED APK (not
  # installable, but proves the pipeline). See shells/android/RELEASE-SIGNING.md.
  #   ANDROID_KEYSTORE_BASE64    (required) base64 of your epix-release.jks
  #   ANDROID_KEYSTORE_PASSWORD  (required) the keystore password
  #   ANDROID_KEY_ALIAS          (optional) defaults to epix-release
  #   ANDROID_KEY_PASSWORD       (optional) defaults to the keystore password (PKCS12)
  android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "27.2.12479018"
    steps:
      - uses: actions/checkout@v5

      - name: Set version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install SDK + NDK packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;${NDK_VERSION}" \
            "platform-tools"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install protoc (mesh transport build dep) + cargo-ndk
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler
          cargo install cargo-ndk --locked

      - name: Build Rust core into jniLibs
        run: |
          cargo ndk -t arm64-v8a -o shells/android/app/src/main/jniLibs \
            build -p epix-ffi --release

      - name: Generate Kotlin UniFFI bindings
        run: |
          cargo run -p epix-ffi --features cli --bin uniffi-bindgen -- generate \
            --library target/aarch64-linux-android/release/libepix_ffi.so \
            --language kotlin --out-dir shells/android/app/src/main/java

      - name: Decode signing keystore
        id: signcfg
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret - the APK will be UNSIGNED."
            echo "sign=false" >> "$GITHUB_OUTPUT"
          else
            echo "$KS_B64" | base64 --decode > "$RUNNER_TEMP/epix-release.jks"
            echo "sign=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        working-directory: shells/android
        env:
          # Stamps versionName/versionCode and the node's reported version.
          EPIX_VERSION: ${{ steps.v.outputs.version }}
          # The Gradle signingConfig reads these (see app/build.gradle.kts). When
          # sign=false the file is empty, so assembleRelease leaves it unsigned.
          # Only the base64 keystore + its password are required: the alias
          # defaults to epix-release, and for a PKCS12 keystore the key password
          # is the keystore password. Set the two optional secrets only to
          # override (e.g. a legacy JKS with a distinct alias or key password).
          EPIX_KEYSTORE_FILE: ${{ steps.signcfg.outputs.sign == 'true' && format('{0}/epix-release.jks', runner.temp) || '' }}
          EPIX_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          EPIX_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'epix-release' }}
          EPIX_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/app-release.apk \
            "$GITHUB_WORKSPACE/epix-android-${{ steps.v.outputs.version }}.apk"

      - name: Print signing fingerprint
        if: steps.signcfg.outputs.sign == 'true'
        run: |
          "$ANDROID_SDK_ROOT"/build-tools/36.0.0/apksigner verify --print-certs \
            "$GITHUB_WORKSPACE/epix-android-${{ steps.v.outputs.version }}.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: epix-android
          path: epix-android-*.apk

  release:
    needs: [macos, linux, windows, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            artifacts/epix-macos/*.dmg
            artifacts/epix-linux/*.tar.gz
            artifacts/epix-windows/*.exe
            artifacts/epix-android/*.apk
          )
          # A release may already exist for this tag: creating one in the GitHub
          # UI makes the tag (which triggers this workflow), and a re-run finds
          # its own earlier release. In that case attach the artifacts to the
          # existing release (--clobber replaces same-named assets on a re-run)
          # instead of failing on "release already exists". Otherwise (a bare
          # `git push` of the tag) create the release.
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --clobber "${files[@]}"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Epix $GITHUB_REF_NAME" \
              --generate-notes \
              "${files[@]}"
          fi
