name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so new advisories against pinned deps get caught even without a push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# No workflow-level permissions; each job requests only what it needs.
permissions: {}

jobs:
  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Ignore the accepted advisories (see deny.toml / osv-scanner.toml for the
      # rationale). A failure here means a NEW advisory has appeared.
      - run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0436

  cargo-deny:
    name: cargo deny (advisories, bans, licenses, sources)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          # Licenses are skipped for now: the workspace's own epix-* crates do
          # not declare a license field, which cargo-deny counts as unlicensed.
          # Add a compliance pass (workspace license) to re-enable it.
          command: check advisories bans sources

  osv-scanner:
    name: osv-scanner (Cargo.lock CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # osv-scanner.toml holds the accepted-advisory ignore list.
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=Cargo.lock

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # These audit-level rules are excluded because their advice is already
      # followed at every call site. nosemgrep comments don't help: a suppressed
      # finding stays in the SARIF and still surfaces as a code-scanning alert,
      # so the rule has to be dropped from the run instead.
      #  - args/args-os: flag EVERY read of the command line; we never trust
      #    argv[0] (all skip(1), none branch on the exe path).
      #  - unsafe-usage: flags EVERY `unsafe` block; iptproxy-sys is an FFI crate
      #    whose blocks are minimal calls into the Snowflake wrapper, each with a
      #    SAFETY comment (there is no way to bind the library without unsafe).
      #  - current-exe: iptproxy-sys calls current_exe() only to find the
      #    Snowflake library shipped beside the executable, not as a trust
      #    decision (an attacker who could write there could replace the exe).
      - run: >-
          semgrep scan
          --config p/rust --config p/security-audit --config p/secrets
          --exclude-rule rust.lang.security.args.args
          --exclude-rule rust.lang.security.args-os.args-os
          --exclude-rule rust.lang.security.unsafe-usage.unsafe-usage
          --exclude-rule rust.lang.security.current-exe.current-exe
          --error --sarif --output semgrep.sarif crates || true
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        if: always()
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly. The gitleaks-action requires a paid
      # license for GitHub organizations; the CLI itself is free (MIT).
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan working tree
        run: gitleaks dir . --config .gitleaks.toml --redact --verbose
