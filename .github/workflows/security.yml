name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so new advisories against pinned deps get caught even without a push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# No workflow-level permissions; each job requests only what it needs.
permissions: {}

jobs:
  cargo-audit:
    name: cargo audit (RustSec advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      # Ignore the accepted advisories (see deny.toml / osv-scanner.toml for the
      # rationale). A failure here means a NEW advisory has appeared.
      - run: >-
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2024-0436

  cargo-deny:
    name: cargo deny (advisories, bans, licenses, sources)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@8a45e1c7c9a95dfae3276e89a553705e40ae45a2 # v2.0.20
        with:
          # Licenses are skipped for now: the workspace's own epix-* crates do
          # not declare a license field, which cargo-deny counts as unlicensed.
          # Add a compliance pass (workspace license) to re-enable it.
          command: check advisories bans sources

  osv-scanner:
    name: osv-scanner (Cargo.lock CVEs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: google/osv-scanner-action/osv-scanner-action@e69cc6c86b31f1e7e23935bbe7031b50e51082de # v2.0.2
        with:
          # osv-scanner.toml holds the accepted-advisory ignore list.
          scan-args: |-
            --config=osv-scanner.toml
            --lockfile=Cargo.lock

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: semgrep scan --config p/rust --config p/security-audit --config p/secrets --error --sarif --output semgrep.sarif crates || true
      - uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always()
        with:
          sarif_file: semgrep.sarif

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Run the gitleaks binary directly. The gitleaks-action requires a paid
      # license for GitHub organizations; the CLI itself is free (MIT).
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan working tree
        run: gitleaks dir . --config .gitleaks.toml --redact --verbose
