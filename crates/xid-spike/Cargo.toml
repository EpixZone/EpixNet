[package]
name = "xid-spike"
version = "0.1.0"
edition = "2021"
publish = false

# Phase-0 spike: port XidResolver's chain-verified .epix resolution to Rust and
# run it against the LIVE api.epix.zone chain — Merkle proof + finalized digest.
# Deleted once epix-chain exists.

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
