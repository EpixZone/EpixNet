# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on security advisories from the RustSec database, except the accepted
# ones below. A green check means no NEW advisory has appeared.
yanked = "warn"
ignore = [
    # RUSTSEC-2023-0071: Marvin timing sidechannel in `rsa`. No fixed upstream
    # release yet. Tracked; revisit when rsa publishes a patched version.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2025-0141: bincode unmaintained. Migration tracked separately.
    "RUSTSEC-2025-0141",
    # RUSTSEC-2024-0436: paste unmaintained (proc-macro, low risk).
    "RUSTSEC-2024-0436",

    # --- Desktop system-tray stack (Linux, epix-browser only) --------------
    # tao/tray-icon need the gtk-rs GTK3 bindings for the Linux tray, and the
    # gtk-rs project has deprecated every GTK3 binding (GTK3 is EOL upstream).
    # This is the only cross-platform tray option; the Rust desktop ecosystem
    # (Tauri included) carries the same ignores. All "unmaintained" bindings:
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    # glib 0.18 `VariantStrIter` unsoundness (CVSS 6.9). Fixed in glib 0.20,
    # but the GTK3 bindings pin glib 0.18, so it is unavoidable while the tray
    # uses GTK3. glib here is used only internally by GTK for the tray's own
    # menu/event loop - our code never iterates untrusted GVariants, so the
    # unsound path is not reachable. Revisit if the tray moves off GTK3.
    "RUSTSEC-2024-0429", # glib VariantStrIter unsoundness
    # proc-macro-error + instant: unmaintained, pulled transitively by the same
    # tao/GTK3 tray stack (a build-time proc-macro helper and a time shim).
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2024-0384", # instant
]

[bans]
# Warn (do not fail) on duplicate crate versions. The tor/arti stack pulls in
# several duplicates that are not under our control.
multiple-versions = "warn"
wildcards = "warn"

[licenses]
# Allow the common permissive licenses used across the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9
# The workspace's own epix-* crates do not declare a license field; skip them
# rather than failing the license check on our own unpublished crates.
private = { ignore = true }

[sources]
# arti/tor crates are pulled from git; allow known git sources.
unknown-git = "warn"
unknown-registry = "warn"
